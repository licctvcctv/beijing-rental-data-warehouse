services:
  hive-metastore-db:
    image: postgres:15
    container_name: rental-hive-metastore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data

  mysql:
    image: mysql:8.0
    container_name: rental-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: rental_result
      MYSQL_USER: rental
      MYSQL_PASSWORD: rental123
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - mysql_data:/var/lib/mysql
      - ./warehouse/sql/mysql/01_wenyu_result.sql:/docker-entrypoint-initdb.d/01_rental_result.sql:ro

  warehouse-platform:
    build:
      context: .
      dockerfile: warehouse/Dockerfile.bigdata
    container_name: rental-warehouse-platform
    hostname: warehouse-platform
    restart: "no"
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      WAIT_TIMEOUT_SECONDS: 300
      WITH_HIVE_METASTORE_SERVER: "true"
      WITH_HIVE_SERVER: "true"
      HIVE_METASTORE_DB_URL: jdbc:postgresql://hive-metastore-db:5432/metastore
      HIVE_METASTORE_DB_DRIVER: org.postgresql.Driver
      HIVE_METASTORE_DB_USER: hive
      HIVE_METASTORE_DB_PASSWORD: hive
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: rental_result
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
    ports:
      - "9870:9870"
      - "8088:8088"
      - "10000:10000"
    volumes:
      - hadoop_data:/var/hadoop/data
      - ./warehouse/target/docker-hadoop-output:/workspace/warehouse/target/docker-hadoop-output
    healthcheck:
      test: ["CMD-SHELL", "test -f /workspace/warehouse/target/docker-hadoop-output/pipeline.success"]
      interval: 30s
      timeout: 5s
      retries: 80
      start_period: 20m

  superset-redis:
    image: redis:7-alpine
    container_name: rental-superset-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: rental-superset
    restart: unless-stopped
    depends_on:
      superset-redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: rental-warehouse-secret-key-change-in-prod
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_FIRSTNAME: Rental
      ADMIN_LASTNAME: Admin
      ADMIN_EMAIL: admin@rental.local
      REDIS_URL: redis://superset-redis:6379/0
    ports:
      - "8089:8088"
    volumes:
      - superset_home:/app/superset_home
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  superset-init:
    image: python:3.11-slim
    container_name: rental-superset-init
    restart: "no"
    depends_on:
      warehouse-platform:
        condition: service_healthy
      superset:
        condition: service_healthy
    environment:
      SUPERSET_URL: http://superset:8088
      SUPERSET_PUBLIC_URL: http://localhost:8089
      SUPERSET_ADMIN_USER: admin
      SUPERSET_ADMIN_PASSWORD: admin
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: rental_result
      MYSQL_USER: rental
      MYSQL_PASSWORD: rental123
      WAIT_TIMEOUT_SECONDS: 120
      SUPERSET_BOOTSTRAP_MARKER_PATH: /workspace/warehouse/target/docker-hadoop-output/superset.success
    command: ["python", "/init/init_superset.py"]
    volumes:
      - ./superset/init_superset.py:/init/init_superset.py:ro
      - ./warehouse/target/docker-hadoop-output:/workspace/warehouse/target/docker-hadoop-output

volumes:
  hadoop_data:
  hive_metastore_db:
  mysql_data:
  superset_home:
